# =============================================================================
# Knol — CI Pipeline
# Runs on every push and PR: lint, test, build images
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ---------------------------------------------------------------------------
  # Rust tests — OSS
  # ---------------------------------------------------------------------------
  test-oss:
    name: Test OSS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: knol-oss
      - name: Run OSS tests
        working-directory: knol-oss
        run: cargo test --workspace --lib

  # ---------------------------------------------------------------------------
  # Rust tests — Enterprise
  # ---------------------------------------------------------------------------
  test-enterprise:
    name: Test Enterprise
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: knol-enterprise
      - name: Run Enterprise tests
        working-directory: knol-enterprise
        run: cargo test --workspace --lib

  # ---------------------------------------------------------------------------
  # Clippy lint
  # ---------------------------------------------------------------------------
  lint:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: knol-oss
      - name: Clippy OSS
        working-directory: knol-oss
        run: cargo clippy --workspace -- -D warnings
      - name: Clippy Enterprise
        working-directory: knol-enterprise
        run: cargo clippy --workspace -- -D warnings

  # ---------------------------------------------------------------------------
  # Format check
  # ---------------------------------------------------------------------------
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check --all --manifest-path knol-oss/Cargo.toml
      - run: cargo fmt --check --all --manifest-path knol-enterprise/Cargo.toml

  # ---------------------------------------------------------------------------
  # Website builds
  # ---------------------------------------------------------------------------
  build-web:
    name: Build Web Frontends
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site:
          - { name: main, build_script: build:web, output: frontend/web/out }
          - { name: admin, build_script: build:admin, output: frontend/admin/out }
          - { name: cloud, build_script: build:app, output: frontend/cloud/out }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & Build
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund
          npm run ${{ matrix.site.build_script }}
      - name: Upload static output
        uses: actions/upload-artifact@v4
        with:
          name: website-out-${{ matrix.site.name }}
          path: ${{ matrix.site.output }}/
          retention-days: 7

  build-demo:
    name: Build Demo UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & Build
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund
          npm run build:demo
      - name: Upload static output
        uses: actions/upload-artifact@v4
        with:
          name: website-out-demo
          path: frontend/demo/out/
          retention-days: 7

  smoke-frontends:
    name: Smoke Frontends
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Run smoke checks
        run: ./scripts/frontend-smoke.sh
