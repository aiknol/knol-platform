name: knol

services:
  db-migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: memory_dev
    volumes:
      - ./knol-oss/migrations:/migrations/oss:ro
      - ./knol-enterprise/migrations:/migrations/enterprise:ro
      - ./scripts/db-migrate.sh:/usr/local/bin/db-migrate.sh:ro
    command: ["sh", "-lc", "/usr/local/bin/db-migrate.sh"]
    restart: "no"

  admin-service:
    image: knol-enterprise-runtime:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.enterprise
      target: runtime
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://memory:memory_dev@postgres:5432/memory
      DB_MAX_CONNECTIONS: "6"
      DB_MIN_CONNECTIONS: "1"
      ADMIN_SERVICE_PORT: "3001"
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?set ADMIN_JWT_SECRET in .env (>=32 chars)}
      ADMIN_ENCRYPTION_KEY: ${ADMIN_ENCRYPTION_KEY:?set ADMIN_ENCRYPTION_KEY in .env (base64 32-byte key)}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:?set ADMIN_INITIAL_PASSWORD in .env (>=12 chars)}
      ADMIN_INITIAL_EMAIL: ${ADMIN_INITIAL_EMAIL:-admin@aiknol.com}
      ADMIN_CORS_ORIGIN: ${ADMIN_CORS_ORIGIN:-http://localhost:3005,http://localhost:3006,http://localhost:3007,http://localhost:3008}
      ADMIN_SECURE_COOKIES: ${ADMIN_SECURE_COOKIES:-false}
      RUST_LOG: info
    command: ["admin-service"]
    ports:
      - "3001:8084"
    mem_limit: 320m

  tenant-service:
    image: knol-enterprise-runtime:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.enterprise
      target: runtime
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://memory:memory_dev@postgres:5432/memory
      DB_MAX_CONNECTIONS: "6"
      DB_MIN_CONNECTIONS: "1"
      TENANT_SERVICE_PORT: "3002"
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?set ADMIN_JWT_SECRET in .env (>=32 chars)}
      TENANT_CORS_ORIGIN: ${TENANT_CORS_ORIGIN:-http://localhost:3005,http://localhost:3006,http://localhost:3007,http://localhost:3008}
      ADMIN_SECURE_COOKIES: ${ADMIN_SECURE_COOKIES:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      RUST_LOG: info
    command: ["tenant-service"]
    ports:
      - "3002:8085"
    mem_limit: 256m

  jobs-service:
    image: knol-enterprise-runtime:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.enterprise
      target: runtime
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://memory:memory_dev@postgres:5432/memory
      DB_MAX_CONNECTIONS: "4"
      DB_MIN_CONNECTIONS: "1"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      RUST_LOG: info
    command: ["jobs-service"]
    mem_limit: 256m

  billing-service:
    image: knol-enterprise-runtime:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.enterprise
      target: runtime
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://memory:memory_dev@postgres:5432/memory
      DB_MAX_CONNECTIONS: "4"
      DB_MIN_CONNECTIONS: "1"
      BILLING_SERVICE_PORT: "8086"
      RUST_LOG: info
    command: ["billing-service"]
    ports:
      - "3003:8086"
    mem_limit: 256m

  ingest-service:
    image: knol-enterprise-runtime:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.enterprise
      target: runtime
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://memory:memory_dev@postgres:5432/memory
      NATS_URL: nats://nats:4222
      DB_MAX_CONNECTIONS: "4"
      DB_MIN_CONNECTIONS: "1"
      INGEST_SERVICE_PORT: "8087"
      RUST_LOG: info
    command: ["ingest-service"]
    ports:
      - "3004:8087"
    mem_limit: 256m
