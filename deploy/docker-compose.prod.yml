# =============================================================================
# Knol — Production Docker Compose (Starter Tier)
# Hetzner CX32 (4 vCPU, 8 GB RAM) + Neon Postgres + Upstash Redis
# =============================================================================
# Usage:
#   cp .env.production.example .env.production
#   docker compose -f deploy/docker-compose.prod.yml --env-file .env.production up -d
# Note:
#   This file sets both `mem_limit/cpus` (plain docker compose on Hetzner)
#   and `deploy.resources` (swarm compatibility).
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Reverse proxy — Caddy (auto-TLS via Let's Encrypt)
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: knol-caddy
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.5"
    environment:
      API_DOMAIN: ${API_DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    networks:
      - knol

  # ---------------------------------------------------------------------------
  # OSS Services
  # ---------------------------------------------------------------------------
  gateway:
    image: ghcr.io/aiknol/knol-oss:${IMAGE_TAG:?set IMAGE_TAG}
    container_name: knol-gateway
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 128m
    cpus: "1.0"
    command: ["gateway"]
    env_file: .env.production
    environment:
      GATEWAY_PORT: "8080"
      GATEWAY_CORS_ORIGINS: ${GATEWAY_CORS_ORIGINS:-https://aiknol.com,https://www.aiknol.com,https://cloud.aiknol.com,https://demo.aiknol.com,https://admin.aiknol.com}
      RESILIENCE_SKIP_RATE_LIMIT_ON_REDIS_FAILURE: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 128M
    networks:
      - knol

  write:
    image: ghcr.io/aiknol/knol-oss:${IMAGE_TAG:?set IMAGE_TAG}
    container_name: knol-write
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.5"
    command: ["write-service"]
    env_file: .env.production
    environment:
      WRITE_SERVICE_PORT: "8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - knol

  retrieve:
    image: ghcr.io/aiknol/knol-oss:${IMAGE_TAG:?set IMAGE_TAG}
    container_name: knol-retrieve
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.5"
    command: ["retrieve-service"]
    env_file: .env.production
    environment:
      RETRIEVE_SERVICE_PORT: "8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    networks:
      - knol

  graph:
    image: ghcr.io/aiknol/knol-oss:${IMAGE_TAG:?set IMAGE_TAG}
    container_name: knol-graph
    restart: unless-stopped
    mem_limit: 128m
    cpus: "1.0"
    command: ["graph-service"]
    env_file: .env.production
    environment:
      GRAPH_SERVICE_PORT: "8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8083/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 128M
    networks:
      - knol

  # ---------------------------------------------------------------------------
  # Enterprise Services
  # ---------------------------------------------------------------------------
  admin:
    image: ghcr.io/aiknol/knol-enterprise:${IMAGE_TAG:?set IMAGE_TAG}
    container_name: knol-admin
    restart: unless-stopped
    mem_limit: 96m
    cpus: "0.5"
    command: ["admin-service"]
    env_file: .env.production
    environment:
      ADMIN_SERVICE_PORT: "8084"
      SKIP_RUNTIME_MIGRATIONS: "true"
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_ENCRYPTION_KEY: ${ADMIN_ENCRYPTION_KEY}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
      ADMIN_CORS_ORIGIN: ${ADMIN_CORS_ORIGIN:-https://aiknol.com,https://www.aiknol.com,https://cloud.aiknol.com,https://demo.aiknol.com,https://admin.aiknol.com}
      MARKETING_SERVICE_URL: http://marketing:8088
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8084/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 96M
    networks:
      - knol

  tenant:
    image: ghcr.io/aiknol/knol-enterprise:${IMAGE_TAG:?set IMAGE_TAG}
    container_name: knol-tenant
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.5"
    command: ["tenant-service"]
    env_file: .env.production
    environment:
      TENANT_SERVICE_PORT: "8085"
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TENANT_CORS_ORIGIN: ${TENANT_CORS_ORIGIN:-https://aiknol.com,https://www.aiknol.com,https://cloud.aiknol.com}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8085/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    networks:
      - knol

  jobs:
    image: ghcr.io/aiknol/knol-enterprise:${IMAGE_TAG:?set IMAGE_TAG}
    container_name: knol-jobs
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.5"
    command: ["jobs-service"]
    env_file: .env.production
    environment:
      JOBS_SERVICE_PORT: "8085"
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - knol

  billing:
    image: ghcr.io/aiknol/knol-enterprise:${IMAGE_TAG:?set IMAGE_TAG}
    container_name: knol-billing
    restart: unless-stopped
    mem_limit: 96m
    cpus: "0.5"
    command: ["billing-service"]
    env_file: .env.production
    environment:
      BILLING_SERVICE_PORT: "8086"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8086/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 96M
    networks:
      - knol

  ingest:
    image: ghcr.io/aiknol/knol-enterprise:${IMAGE_TAG:?set IMAGE_TAG}
    container_name: knol-enterprise-ingest
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.5"
    command: ["ingest-service"]
    env_file: .env.production
    environment:
      INGEST_SERVICE_PORT: "8087"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8087/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - knol

  marketing:
    image: ghcr.io/aiknol/knol-enterprise:${IMAGE_TAG:?set IMAGE_TAG}
    container_name: knol-marketing
    restart: unless-stopped
    mem_limit: 96m
    cpus: "0.5"
    command: ["marketing-service"]
    env_file: .env.production
    environment:
      MARKETING_SERVICE_PORT: "8088"
      ADMIN_ENCRYPTION_KEY: ${ADMIN_ENCRYPTION_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8088/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 96M
    networks:
      - knol

  # ---------------------------------------------------------------------------
  # Infrastructure — Self-hosted on VPS
  # ---------------------------------------------------------------------------
  nats:
    image: nats:2.10-alpine
    container_name: knol-nats
    restart: unless-stopped
    mem_limit: 384m
    cpus: "1.0"
    command: >
      --jetstream
      --http_port=8222
      --store_dir=/data
      --user=${NATS_USER:-knol}
      --pass=${NATS_PASSWORD:?NATS_PASSWORD must be set}
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 384M
    networks:
      - knol

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: knol-minio
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.5"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - knol

# ---------------------------------------------------------------------------
# Persistent volumes
# ---------------------------------------------------------------------------
volumes:
  caddy_data:
  caddy_config:
  nats_data:
  minio_data:

# ---------------------------------------------------------------------------
# Internal network — no ports exposed except through Caddy
# ---------------------------------------------------------------------------
networks:
  knol:
    driver: bridge
