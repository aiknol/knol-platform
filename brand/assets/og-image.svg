<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0A0A0B"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1A1D" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <!-- Accent glow -->
  <circle cx="600" cy="315" r="200" fill="#6E56CF" opacity="0.08"/>
  <!-- Icon -->
  <rect x="480" y="175" width="80" height="80" rx="18" fill="#1A1A1D" stroke="#2A2A2E" stroke-width="1"/>
  <path d="M505 195v40M505 215l20-20M505 215l20 20" stroke="#FAFAFA" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="535" cy="195" r="3.5" fill="#6E56CF"/>
  <circle cx="535" cy="235" r="3.5" fill="#6E56CF"/>
  <!-- Wordmark -->
  <text x="575" y="237" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="64" font-weight="500" letter-spacing="-2" fill="#FAFAFA">knol</text>
  <!-- Tagline -->
  <text x="600" y="340" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" font-weight="400" letter-spacing="0" fill="#71717A">Memory infrastructure for AI</text>
  <!-- URL -->
  <text x="600" y="490" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="400" letter-spacing="1" fill="#52525B">knol.dev</text>
</svg>
